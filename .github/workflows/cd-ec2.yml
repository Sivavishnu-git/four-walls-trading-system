name: CD to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Install SSH/rsync tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rsync openssh-client

      - name: Prepare SSH key
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "EC2_SSH_KEY secret is not set"; exit 1
          fi
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          if [ -z "$EC2_USER" ]; then
            echo "EC2_USER not set. Defaulting to ubuntu."
            echo "EC2_USER=ubuntu" >> "$GITHUB_ENV"
          fi
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is not set"; exit 1
          fi

      # SSH must reach the instance public IP / EIP — not the ALB hostname (ALB has no port 22).
      # Security group must allow GitHub Actions: inbound TCP 22 from 0.0.0.0/0 (simplest) or
      # https://api.github.com/meta (actions key in the JSON) — runner IPs change every job.
      - name: Sync repo to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
            --exclude node_modules \
            --exclude .git \
            --exclude .env \
            --exclude logs \
            --exclude .github \
            ./ "$EC2_USER@$EC2_HOST:/home/$EC2_USER/app/"

      - name: Deploy services on EC2
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o BatchMode=yes \
            -o RequestTTY=no \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$EC2_USER@$EC2_HOST" << 'EOF'
          set -euo pipefail
          cd "$HOME/app" || cd /home/ubuntu/app
          npm install --omit=dev

          sudo cp deploy/nginx.conf /etc/nginx/sites-available/livetrading
          sudo ln -sf /etc/nginx/sites-available/livetrading /etc/nginx/sites-enabled/livetrading
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl reload nginx

          pm2 delete livetrading 2>/dev/null || true
          pm2 start deploy/ecosystem.config.cjs
          pm2 save

          # Wait for backend to bind and warm up.
          ok=0
          for i in $(seq 1 20); do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/tools/discover-nifty-future || true)"
            echo "API_STATUS:$code (attempt $i/20)"
            if [ "$code" = "200" ]; then
              ok=1
              break
            fi
            sleep 3
          done

          if [ "$ok" -ne 1 ]; then
            echo "API health check failed after retries"
            pm2 status || true
            pm2 logs livetrading --lines 80 --nostream || true
            exit 1
          fi
          EOF

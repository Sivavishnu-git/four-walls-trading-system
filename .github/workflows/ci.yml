name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - sit-branch
      - test-branch

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint (non-blocking for existing lint debt)
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build

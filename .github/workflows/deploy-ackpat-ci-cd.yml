name: deploy-ackpat-ci-cd

on:
  pull_request:
  push:
    branches:
      - main
      - sit-branch
      - test-branch
  workflow_dispatch:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint (non-blocking for existing lint debt)
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build

  # CloudFormation update: syncs IAM role / infra before app deploy
  cfn-update:
    needs: lint-build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      - name: Deploy CloudFormation stack
        run: |
          STACK_NAME="${{ secrets.CFN_STACK_NAME }}"
          if [ -z "$STACK_NAME" ]; then
            echo "CFN_STACK_NAME secret is not set"; exit 1
          fi

          # Check if stack exists
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STATUS" = "DOES_NOT_EXIST" ]; then
            echo "Stack $STACK_NAME does not exist — creating..."
            ACTION="create-stack"
            WAIT_EVENT="stack-create-complete"
          else
            echo "Stack $STACK_NAME exists (status: $STATUS) — updating..."
            ACTION="update-stack"
            WAIT_EVENT="stack-update-complete"
          fi

          aws cloudformation $ACTION \
            --stack-name "$STACK_NAME" \
            --template-body file://deploy/cloudformation.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameters file://deploy/cfn-params.example.json 2>&1 | tee /tmp/cfn-output.txt || {
              # update-stack exits non-zero when there are no changes — that is fine
              if grep -q "No updates are to be performed" /tmp/cfn-output.txt; then
                echo "No CloudFormation changes — skipping wait."
                exit 0
              fi
              cat /tmp/cfn-output.txt
              exit 1
            }

          echo "Waiting for $WAIT_EVENT..."
          aws cloudformation wait "$WAIT_EVENT" --stack-name "$STACK_NAME"
          echo "CloudFormation update complete."

  # EC2 deploy: only after CI passes on main (or manual run from Actions tab)
  deploy:
    needs: [lint-build, cfn-update]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: cd-ec2-main
      cancel-in-progress: true
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Install SSH/rsync tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rsync openssh-client

      - name: Prepare SSH key
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "EC2_SSH_KEY secret is not set"; exit 1
          fi
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          if [ -z "$EC2_USER" ]; then
            echo "EC2_USER not set. Defaulting to ubuntu."
            echo "EC2_USER=ubuntu" >> "$GITHUB_ENV"
          fi
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is not set"; exit 1
          fi

      # SSH must reach the instance public IP / EIP — not the ALB hostname (ALB has no port 22).
      # Security group must allow GitHub Actions: inbound TCP 22 from 0.0.0.0/0 (simplest) or
      # https://api.github.com/meta (actions key in the JSON) — runner IPs change every job.
      - name: Sync repo to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
            --exclude node_modules \
            --exclude .git \
            --exclude .env \
            --exclude logs \
            --exclude .github \
            ./ "$EC2_USER@$EC2_HOST:/home/$EC2_USER/app/"

      - name: Deploy services on EC2
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o BatchMode=yes \
            -o RequestTTY=no \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$EC2_USER@$EC2_HOST" << 'EOF'
          set -euo pipefail
          cd "$HOME/app" || cd /home/ubuntu/app
          npm install --omit=dev

          sudo cp deploy/nginx.conf /etc/nginx/sites-available/livetrading
          sudo ln -sf /etc/nginx/sites-available/livetrading /etc/nginx/sites-enabled/livetrading
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl reload nginx

          pm2 delete livetrading 2>/dev/null || true
          pm2 start deploy/ecosystem.config.cjs
          pm2 save

          # Wait for backend to bind and warm up.
          ok=0
          for i in $(seq 1 20); do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/tools/discover-nifty-future || true)"
            echo "API_STATUS:$code (attempt $i/20)"
            if [ "$code" = "200" ]; then
              ok=1
              break
            fi
            sleep 3
          done

          if [ "$ok" -ne 1 ]; then
            echo "API health check failed after retries"
            pm2 status || true
            pm2 logs livetrading --lines 80 --nostream || true
            exit 1
          fi
          EOF

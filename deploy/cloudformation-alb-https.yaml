AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HTTPS Application Load Balancer + ACM certificate (DNS validation) + Route 53 alias
  to an existing EC2 instance running Nginx on port 80. Deploy after the main LiveTrading stack.

Parameters:
  DomainName:
    Type: String
    Description: Fully qualified hostname (e.g. app.example.com)

  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for that domain (e.g. Z0123456789ABCDEFGHIJ)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EC2 instance and ALB live

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet (different AZ than PublicSubnet2)

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet (ALB requires 2 AZs)

  EC2InstanceId:
    Type: String
    Description: Instance ID of the LiveTrading EC2 target

  AppSecurityGroupId:
    Type: String
    Description: Security group ID on the EC2 instance (ingress from ALB will be added)

Resources:
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      GroupDescription: !Sub "ALB HTTPS for ${AWS::StackName}"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP for redirect to HTTPS
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb-sg"

  AlbToEc2Ingress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AppSecurityGroupId
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: HTTP from ALB to Nginx

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      TargetType: instance
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-tg"

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    DependsOn:
      - TargetGroup
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: 443
            StatusCode: HTTP_301

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: true

Outputs:
  LoadBalancerDnsName:
    Description: ALB DNS (optional direct test)
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  HttpsUrl:
    Description: Public HTTPS URL
    Value: !Sub "https://${DomainName}"

  TargetGroupArn:
    Description: Pass to register-targets if needed
    Value: !Ref TargetGroup

  CertificateArn:
    Description: Issued ACM certificate
    Value: !Ref Certificate
